<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0d0f">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="A non-interactive, auto-fitted frame for the current RSpice Workbench GUI mockup.">
  <title>RSpice Workbench — Embedded GUI frame</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #0b0d0f; }
    body { color: #e8ebed; font-family: system-ui, sans-serif; }
    main, .stage { position: absolute; inset: 0; min-width: 0; min-height: 0; overflow: hidden; }
    .stage { display: flex; align-items: center; justify-content: center; }
    .scaled-shell { position: relative; flex: 0 0 auto; overflow: hidden; background: #11171b; }
    .device { position: absolute; top: 0; left: 0; width: 1440px; height: 900px; overflow: hidden; background: #11171b; transform-origin: top left; }
    iframe { display: block; width: 1440px; height: 900px; border: 0; background: #11171b; pointer-events: none; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <main>
    <h1 class="visually-hidden">RSpice Workbench embedded GUI frame</h1>
    <div class="stage" data-stage>
      <div class="scaled-shell" data-shell>
        <div class="device" data-device>
          <iframe src="workbench/index.html?view=design&amp;platform=desktop" title="RSpice Workbench schematic interface" tabindex="-1"></iframe>
        </div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      "use strict";
      var sourceWidth = 1440;
      var sourceHeight = 900;
      var stage = document.querySelector("[data-stage]");
      var shell = document.querySelector("[data-shell]");
      var device = document.querySelector("[data-device]");

      function fitWorkbench() {
        var scale = Math.min(stage.clientWidth / sourceWidth, stage.clientHeight / sourceHeight, 1);
        device.style.transform = "scale(" + scale + ")";
        shell.style.width = sourceWidth * scale + "px";
        shell.style.height = sourceHeight * scale + "px";
      }

      window.addEventListener("resize", fitWorkbench);
      if ("ResizeObserver" in window) new ResizeObserver(fitWorkbench).observe(stage);
      fitWorkbench();
    })();
  </script>
</body>
</html>
