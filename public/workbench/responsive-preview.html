<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RSpice Workbench — Responsive Preview Lab</title>
  <style>
    @font-face{font-family:Plex;src:url("../assets/fonts/IBMPlexSans-Regular.ttf")}@font-face{font-family:Plex;src:url("../assets/fonts/IBMPlexSans-SemiBold.ttf");font-weight:600}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#0a0f12;color:#d7dbde;font:13px/1.35 Plex,"Segoe UI",sans-serif}
    body{display:grid;grid-template-rows:58px minmax(0,1fr)}
    header{display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid #2b3136;background:#1a2024}
    header h1{margin:0 9px 0 0;font-size:13px;font-weight:600;white-space:nowrap}header h1 span{color:#f2b824}
    .segmented{display:flex;height:30px;border:1px solid #444c50;border-radius:4px;overflow:hidden;background:#0b1115}
    button,select,a{height:30px;border:0;color:#93999e;background:transparent;font:inherit}button{padding:0 11px;border-right:1px solid #2b3136;cursor:pointer}button:last-child{border-right:0}button:hover,button.active{color:#d7dbde;background:#2e3a41}button.active{box-shadow:inset 0 -2px #f2b824}
    label{display:flex;align-items:center;gap:7px;color:#858b8f;font-size:10px}select{min-width:130px;padding:0 24px 0 8px;border:1px solid #444c50;border-radius:4px;background:#0b1115;cursor:pointer}
    .spacer{flex:1}a{display:inline-flex;align-items:center;padding:0 10px;border:1px solid #444c50;border-radius:4px;text-decoration:none}a:hover{color:#d7dbde;background:#2e3a41}
    main{position:relative;min-width:0;min-height:0;overflow:hidden;background:radial-gradient(circle at 50% 45%,#20292e 0,#11171b 48%,#080c0f 100%)}
    .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
    .scaled-shell{position:relative;flex:0 0 auto}.device{position:absolute;top:0;left:0;border:1px solid #444c50;border-radius:9px;overflow:hidden;background:#11171b;box-shadow:0 24px 70px rgba(0,0,0,.58),0 4px 14px rgba(0,0,0,.45);transform-origin:top left}
    .device::before{position:absolute;z-index:2;inset:0;border:1px solid rgba(255,255,255,.05);border-radius:8px;content:"";pointer-events:none}iframe{display:block;width:100%;height:100%;border:0;background:#11171b}
    .device-label{position:fixed;right:14px;bottom:12px;padding:5px 8px;border:1px solid #2b3136;border-radius:3px;color:#858b8f;background:rgba(11,17,21,.9);font-size:10px;letter-spacing:.05em}
    @media(max-width:760px){header{gap:6px;padding:0 8px;overflow-x:auto}header h1{display:none}.spacer{display:none}label span{display:none}a{white-space:nowrap}.stage{padding:12px}}
  </style>
  <style>
    header button, header select, header a { min-height: 44px; }
    header .segmented { height: 44px; }
    @media (max-width:760px) { header { min-height: 58px; } }
  </style>
</head>
<body>
  <header>
    <h1><span>RSpice</span> responsive preview</h1>
    <div class="segmented" aria-label="Viewport preset">
      <button class="active" type="button" data-size="1440,900" data-platform="desktop">Desktop</button>
      <button type="button" data-size="1024,768" data-platform="tablet">Tablet</button>
      <button type="button" data-size="390,844" data-platform="mobile">Phone</button>
    </div>
    <label><span>Surface</span><select id="view" aria-label="Workspace view"><optgroup label="Primary workspaces"><option value="design">Schematic</option><option value="simulate">Simulation</option><option value="results">Results</option><option value="verify">Verification</option><option value="models">Models / PDK</option><option value="netlist">Netlist IDE</option><option value="project">Project hub</option></optgroup><optgroup label="Persistent engineering documents"><option value="code:reports">Report authoring</option><option value="workspace:release-cockpit">Release closure</option><option value="workspace:multi-test-studio">Verification run plan</option><option value="workspace:ams-workbench">AMS verification</option><option value="workspace:rf-workbench">RF verification</option><option value="workspace:high-sigma-workbench">High-sigma variation</option><option value="workspace:layout-workbench">Physical layout</option><option value="workspace:lvs-pex-workbench">LVS / parasitic extraction</option><option value="workspace:em-workbench">EM / IR / electrothermal</option><option value="workspace:si-pi-workbench">SI / PI / SerDes</option><option value="workspace:reliability-workbench">Reliability / SOA</option><option value="workspace:visualization-studio">Visualization Studio</option><option value="workspace:model-editor">Device model editor</option><option value="workspace:pcell-designer">PCell designer</option><option value="workspace:model-extraction">Model extraction</option><option value="workspace:model-correlation">Measurement correlation</option><option value="workspace:job-diagnostics">Failure diagnostics</option><option value="workspace:regression-orchestration">Regression orchestration</option><option value="workspace:api-browser">Automation API browser</option></optgroup></select></label>
    <button type="button" id="rotate" title="Rotate the selected viewport">↻ Rotate</button>
    <div class="spacer"></div>
    <a href="surface-gallery.html">Workflow surfaces</a><a href="state-gallery.html">Operational states</a><a id="open" href="index.html?view=design&amp;platform=desktop" target="_blank" rel="noopener">Open full size ↗</a>
  </header>
  <main>
    <div class="stage" id="stage"><div class="scaled-shell" id="scaled-shell"><div class="device" id="device"><iframe id="preview" src="index.html?view=design&amp;platform=desktop" title="RSpice Workbench responsive preview"></iframe></div></div></div>
    <div class="device-label" id="device-label">1440 × 900 · 100%</div>
  </main>
  <script>
    const stage=document.getElementById("stage"),shell=document.getElementById("scaled-shell"),device=document.getElementById("device"),frame=document.getElementById("preview"),label=document.getElementById("device-label"),view=document.getElementById("view"),open=document.getElementById("open");
    let width=1440,height=900,platform="desktop";
    const workspaceOwners={"release-cockpit":"verify","multi-test-studio":"verify","ams-workbench":"simulate","rf-workbench":"simulate","fastspice-workbench":"simulate","high-sigma-workbench":"verify","layout-workbench":"design","photonics-workbench":"design","heterogeneous-workbench":"design","lvs-pex-workbench":"verify","em-workbench":"verify","si-pi-workbench":"verify","reliability-workbench":"verify","visualization-studio":"results","model-editor":"models","pcell-designer":"models","library-characterization":"models","model-extraction":"models","model-correlation":"models","job-diagnostics":"simulate","regression-orchestration":"netlist","api-browser":"netlist"};
    const persistentGroup=[...view.querySelectorAll("optgroup")].find(group=>group.label==="Persistent engineering documents");
    [["workspace:fastspice-workbench","FastSPICE / full-chip"],["workspace:photonics-workbench","Electronic photonics"],["workspace:heterogeneous-workbench","Heterogeneous assembly"],["workspace:library-characterization","Cell-library characterization"]].forEach(([value,labelText])=>{const option=document.createElement("option");option.value=value;option.textContent=labelText;persistentGroup.append(option);});
    function setFrameUrl(){const [kind,value]=view.value.split(":");const workspace=kind==="workspace"?value:null,code=kind==="code"?value:null;const owner=workspaceOwners[workspace]||(code?"netlist":view.value);const url=`index.html?view=${encodeURIComponent(owner)}&platform=${encodeURIComponent(platform)}${workspace?`&workspace=${encodeURIComponent(workspace)}`:""}${code?`&code=${encodeURIComponent(code)}`:""}`;frame.src=url;open.href=url;}
    function fit(){const style=getComputedStyle(stage),availableWidth=stage.clientWidth-parseFloat(style.paddingLeft)-parseFloat(style.paddingRight),availableHeight=stage.clientHeight-parseFloat(style.paddingTop)-parseFloat(style.paddingBottom),scale=Math.min(availableWidth/width,availableHeight/height,1);device.style.width=width+"px";device.style.height=height+"px";device.style.transform=`scale(${scale})`;shell.style.width=width*scale+"px";shell.style.height=height*scale+"px";label.textContent=`${width} × ${height} · ${Math.round(scale*100)}%`;}
    document.querySelectorAll("[data-size]").forEach(button=>button.addEventListener("click",()=>{document.querySelectorAll("[data-size]").forEach(b=>b.classList.toggle("active",b===button));[width,height]=button.dataset.size.split(",").map(Number);platform=button.dataset.platform;setFrameUrl();fit();}));
    document.getElementById("rotate").addEventListener("click",()=>{[width,height]=[height,width];fit();});
    view.addEventListener("change",setFrameUrl);
    window.addEventListener("resize",fit);fit();
  </script>
</body>
</html>
