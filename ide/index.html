<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSpice — IDE (browser)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='25' fill='%23F2B824'/%3E%3Cg transform='translate(14.4 14.4) scale(0.7)'%3E%3Cg fill='none' stroke='%2317181A' stroke-width='10.5'%3E%3Cpath d='M 8 32 H 29'/%3E%3Cpath d='M 8 64 H 29'/%3E%3Cpath d='M 70 48 H 88'/%3E%3C/g%3E%3Cg fill='%2317181A'%3E%3Ccircle cx='8' cy='32' r='8'/%3E%3Ccircle cx='8' cy='64' r='8'/%3E%3Ccircle cx='88' cy='48' r='8'/%3E%3C/g%3E%3Cpath d='M 25 20 L 25 76 L 71 48 Z' fill='%2317181A' stroke='%2317181A' stroke-width='10.5' stroke-linejoin='round'/%3E%3C/g%3E%3C/svg%3E">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  body { background: #11171B; }
  canvas#rspice_canvas {
    display: block; width: 100%; height: 100%;
    outline: none; touch-action: none;
  }
  #rspice_loading {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: #11171B;
    font-family: "Segoe UI", system-ui, sans-serif; color: #93999E;
  }
  #rspice_loading .tile {
    width: 72px; height: 72px; border-radius: 22%;
    background: #F2B824;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #rspice_loading .tile svg { width: 70%; height: 70%; }
  #rspice_loading p { margin: 0; font-size: 14px; letter-spacing: 0.04em; }
  #rspice_loading .err { color: #E06C5A; max-width: 48ch; text-align: center; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @media (prefers-reduced-motion: reduce) {
    #rspice_loading .tile { animation: none; }
  }
</style>
</head>
<body>
<div id="rspice_loading">
  <div class="tile" aria-hidden="true">
    <svg viewBox="0 0 96 96">
      <g fill="#17181A" stroke="#17181A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 31 20 L 31 76 L 77 48 Z"></path>
        <path d="M 9 34 H 30" fill="none"></path>
        <path d="M 9 62 H 30" fill="none"></path>
        <path d="M 77 48 H 87" fill="none"></path>
      </g>
    </svg>
  </div>
  <p>loading the RSpice IDE — engine, schematic editor, waveforms…</p>
</div>
<canvas id="rspice_canvas"></canvas>
<script>
  // wgpu 23 (pinned by egui 0.29) still requests the WebGPU limit
  // `maxInterStageShaderComponents`, which the spec dropped and Chrome 129+
  // rejects. Strip it before the module's requestDevice call.
  // TODO: remove once rspice-ui moves to egui >= 0.31 (wgpu >= 24).
  if (navigator.gpu && window.GPUAdapter) {
    const origRequestDevice = GPUAdapter.prototype.requestDevice;
    GPUAdapter.prototype.requestDevice = function (desc) {
      if (desc && desc.requiredLimits) {
        delete desc.requiredLimits.maxInterStageShaderComponents;
      }
      return origRequestDevice.call(this, desc);
    };
  }
</script>
<script type="module">
  import init from "./pkg/rspice-ui.js";
  init().catch((e) => {
    const el = document.getElementById("rspice_loading");
    if (el) {
      el.innerHTML = "<p class='err'>failed to load the RSpice module: " + e +
        "</p><p class='err'>A WebGPU-capable browser (current Chrome/Edge) is required.</p>";
    }
    console.error(e);
  });
</script>
</body>
</html>
