<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSpice — IDE (browser)</title>
<meta name="description" content="Run the browser-based RSpice IDE with the WebAssembly engine, schematic editor, and waveform workspace.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='25' fill='%23F2B824'/%3E%3Cg transform='translate(14.4 14.4) scale(0.7)'%3E%3Cg fill='none' stroke='%2317181A' stroke-width='10.5'%3E%3Cpath d='M 8 32 H 29'/%3E%3Cpath d='M 8 64 H 29'/%3E%3Cpath d='M 70 48 H 88'/%3E%3C/g%3E%3Cg fill='%2317181A'%3E%3Ccircle cx='8' cy='32' r='8'/%3E%3Ccircle cx='8' cy='64' r='8'/%3E%3Ccircle cx='88' cy='48' r='8'/%3E%3C/g%3E%3Cpath d='M 25 20 L 25 76 L 71 48 Z' fill='%2317181A' stroke='%2317181A' stroke-width='10.5' stroke-linejoin='round'/%3E%3C/g%3E%3C/svg%3E">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
  body { background: #11171B; }
  #rspice_spoken_feedback {
    position: fixed; top: 8px; left: 8px; z-index: 30;
    transform: translateY(calc(-100% - 16px));
    border: 1px solid #F2B824; border-radius: 4px;
    padding: 9px 12px; background: #171D21; color: #F4F6F7;
    font: 600 14px/1.2 "Segoe UI", system-ui, sans-serif;
    transition: transform 120ms ease;
  }
  #rspice_spoken_feedback:focus-visible {
    transform: translateY(0);
    outline: 3px solid #F2B824; outline-offset: 2px;
  }
  canvas#rspice_canvas {
    display: block; width: 100%; height: 100%;
    outline: none; touch-action: none;
  }
  #rspice_loading {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: #11171B;
    font-family: "Segoe UI", system-ui, sans-serif; color: #93999E;
  }
  #rspice_loading .tile {
    width: 72px; height: 72px; border-radius: 22%;
    background: #F2B824;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 1.6s ease-in-out infinite;
  }
  #rspice_loading .tile svg { width: 70%; height: 70%; }
  #rspice_loading p { margin: 0; font-size: 14px; letter-spacing: 0.04em; }
  #rspice_loading .err { color: #E06C5A; max-width: 48ch; text-align: center; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @media (prefers-reduced-motion: reduce) {
    #rspice_loading .tile { animation: none; }
    #rspice_spoken_feedback { transition: none; }
  }
</style>
</head>
<body>
<button id="rspice_spoken_feedback" type="button" aria-pressed="false">Enable spoken interaction feedback</button>
<div id="rspice_loading" role="status" aria-live="polite" aria-atomic="true">
  <div class="tile" aria-hidden="true">
    <svg viewBox="0 0 96 96">
      <g fill="#17181A" stroke="#17181A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 31 20 L 31 76 L 77 48 Z"></path>
        <path d="M 9 34 H 30" fill="none"></path>
        <path d="M 9 62 H 30" fill="none"></path>
        <path d="M 77 48 H 87" fill="none"></path>
      </g>
    </svg>
  </div>
  <p>loading the RSpice IDE — engine, schematic editor, waveforms…</p>
</div>
<canvas
  id="rspice_canvas"
  aria-label="RSpice application canvas. Use the preceding control to enable spoken interaction feedback."
>RSpice requires a browser with canvas and WebGPU support.</canvas>
<script>
  // The current egui/WebGPU stack still requests the WebGPU limit
  // `maxInterStageShaderComponents`, which the spec dropped and Chrome 129+
  // rejects. Strip it before the module's requestDevice call.
  // TODO: remove once the egui/WebGPU stack no longer requests that limit.
  if (navigator.gpu && window.GPUAdapter) {
    const origRequestDevice = GPUAdapter.prototype.requestDevice;
    GPUAdapter.prototype.requestDevice = function (desc) {
      if (desc && desc.requiredLimits) {
        delete desc.requiredLimits.maxInterStageShaderComponents;
      }
      return origRequestDevice.call(this, desc);
    };
  }

  // Semantic DOM bootstrap for users who need spoken feedback before they
  // enter eframe's canvas. Rust and this control synchronize through an
  // attribute so changing the setting never reloads or discards work.
  (() => {
    const attribute = "data-rspice-spoken-feedback";
    const storageKey = "rspice.web.spoken-feedback";
    const root = document.documentElement;
    const button = document.getElementById("rspice_spoken_feedback");

    function enabledFromAttribute() {
      return root.getAttribute(attribute) === "true";
    }

    function updateControlAndStorage() {
      const enabled = enabledFromAttribute();
      button.setAttribute("aria-pressed", String(enabled));
      button.textContent = enabled
        ? "Disable spoken interaction feedback"
        : "Enable spoken interaction feedback";
      try {
        localStorage.setItem(storageKey, String(enabled));
      } catch (_) {
        // Storage can be unavailable in hardened/private contexts. The DOM
        // attribute still keeps the preference active for this page session.
      }
    }

    let enabled = false;
    try {
      enabled = localStorage.getItem(storageKey) === "true";
    } catch (_) {
      // Keep the safe opt-in default when storage is unavailable.
    }
    root.setAttribute(attribute, String(enabled));
    updateControlAndStorage();

    new MutationObserver(updateControlAndStorage).observe(root, {
      attributes: true,
      attributeFilter: [attribute],
    });
    button.addEventListener("click", () => {
      root.setAttribute(attribute, String(!enabledFromAttribute()));
      // eframe listens for resize and schedules a repaint, allowing Rust to
      // consume the updated attribute without a destructive page reload.
      window.dispatchEvent(new Event("resize"));
    });
  })();
</script>
<script type="module">
  // Release assembly replaces this token with a content-addressed directory
  // containing the worker, wasm-bindgen module, and Wasm binary. Development
  // serving keeps the source-tree layout and uses one fresh page identity.
  const RELEASE_ASSET_ROOT = "./assets/cbb5e908f3c5dda28560cda8ee0dac3f251d059971658a251348269cd08f7728";
  const IS_RELEASE = !RELEASE_ASSET_ROOT.startsWith("__RSPICE_");
  const DEVELOPMENT_ASSET_VERSION = `dev-${Date.now()}`;

  function executableAsset(name) {
    const path = IS_RELEASE
      ? `${RELEASE_ASSET_ROOT}/${name}`
      : name === "simulation-worker.js"
        ? "./simulation-worker.js"
        : `./pkg/${name}`;
    const url = new URL(path, import.meta.url);
    if (!IS_RELEASE) {
      url.searchParams.set("v", DEVELOPMENT_ASSET_VERSION);
    }
    return url;
  }

  async function loadCompressedWasm() {
    const response = await fetch(executableAsset("rspice-ui_bg.wasm.gz"));
    if (!response.ok || !response.body) {
      throw new Error(`Failed to fetch compressed RSpice module (${response.status}).`);
    }
    const stream = response.body.pipeThrough(new DecompressionStream("gzip"));
    return new Response(stream).arrayBuffer();
  }

  function showStartupError(message) {
    const el = document.getElementById("rspice_loading");
    if (!el) {
      return;
    }
    el.setAttribute("role", "alert");
    el.setAttribute("aria-live", "assertive");
    el.replaceChildren();
    for (const text of [
      message,
      "A WebGPU-capable browser (current Chrome/Edge) is required.",
    ]) {
      const paragraph = document.createElement("p");
      paragraph.className = "err";
      paragraph.textContent = text;
      el.appendChild(paragraph);
    }
  }

  function errorMessage(error) {
    return error && error.message ? error.message : String(error);
  }

  function recordWorkerStartupError(message) {
    window.__RSPICE_SIM_WORKER_ERROR = message;
  }

  function reportSimulationWorkerStartupError(error) {
    const message = `RSpice simulation worker failed: ${errorMessage(error)}`;
    recordWorkerStartupError(message);
    showStartupError(message);
  }

  function installSimulationWorker() {
    try {
      const workerUrl = executableAsset("simulation-worker.js");
      // Retain the exact page-bound URL even after an abort/error terminates
      // the eager worker. Rust recreates only this immutable worker version.
      window.__RSPICE_SIM_WORKER_URL = workerUrl.href;
      const worker = new Worker(
        workerUrl,
        { type: "module" },
      );
      worker.addEventListener("error", (event) => {
        reportSimulationWorkerStartupError(
          event.message || "Browser simulation worker failed to load.",
        );
      });
      worker.addEventListener("messageerror", () => {
        reportSimulationWorkerStartupError(
          "Browser simulation worker returned an unreadable startup message.",
        );
      });
      worker.addEventListener("message", (event) => {
        const message = event.data || {};
        if (message.type === "error" && (!message.id || message.id === 0)) {
          reportSimulationWorkerStartupError(
            message.error || message.message || "Browser simulation worker failed to initialize.",
          );
        }
      });
      window.__RSPICE_SIM_WORKER = worker;
    } catch (error) {
      const message = `Failed to start the RSpice simulation worker: ${errorMessage(error)}`;
      recordWorkerStartupError(message);
      showStartupError(message);
      console.error(error);
    }
  }

  installSimulationWorker();

  import(executableAsset("rspice-ui.js").href)
    .then(async ({ default: init }) =>
      init({ module_or_path: await loadCompressedWasm() }),
    )
    .catch((e) => {
      showStartupError(`Failed to load the RSpice module: ${errorMessage(e)}`);
      console.error(e);
    });
</script>
</body>
</html>
